version: '3.9'

services:
  db:
    image: postgres:15
    container_name: dscc_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: dscc_django
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db  
    
  nginx:
    image: nginx:latest
    container_name: dscc_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web



volumes:
  postgres_data:
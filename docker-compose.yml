version: '3.9'

services:
  db:
    image: postgres:15
    container_name: dscc_postgres
    environment:
      POSTGRES_DB: dscc_db
      POSTGRES_USER: dscc_user
      POSTGRES_PASSWORD: dscc_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: dscc_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: